# ============================================================
# E2T-PTR Evaluation Config — 5 Tasks (Decoding)
# Uses best checkpoint from fine-tuning (epoch 30)
# ============================================================

# ---------- Hardware ----------
cuda: "cuda:0"

# ---------- Paths ----------
dataset_path: "./zuco_dataset/"
pretrained_model: "./models/huggingface/bart-large"

# Best fine-tuned CT-E2T checkpoint
ct_e2t_checkpoint: "./checkpoints/CT-E2T/BestModel_ct_e2t_5_tasks_bart_large.pt"

# ---------- Output ----------
output_file: "./results/decoding_results_5tasks.txt"

# ---------- Model Architecture (must match training) ----------
eeg_dim: 840
eeg_encoder_layers: 6
eeg_encoder_heads: 8
eeg_encoder_dim_feedforward: 2048

# ---------- Generation Parameters ----------
num_beams: 5
max_length: 60
min_length: 1

# ---------- Evaluation ----------
num_samples: 30